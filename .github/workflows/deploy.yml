name: SewIvoire CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────
  # JOB 1 — Tests backend Django
  # ────────────────────────────────────────────
  backend-ci:
    name: Backend — Tests Django
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sewivoire_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: SewIvoire/SewIvoire/requirements.txt

      - name: Installer les dépendances Python
        working-directory: SewIvoire/SewIvoire
        run: pip install -r requirements.txt

      - name: Créer le fichier .env de test
        working-directory: SewIvoire/SewIvoire
        run: |
          cat > .env <<EOF
          SECRET_KEY=ci-secret-key-not-used-in-production
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          DB_NAME=sewivoire_test
          DB_USER=root
          DB_PASSWORD=root
          DB_HOST=127.0.0.1
          DB_PORT=3306
          EOF

      - name: Appliquer les migrations
        working-directory: SewIvoire/SewIvoire
        run: python manage.py migrate --no-input

      - name: Lancer les tests Django
        working-directory: SewIvoire/SewIvoire
        run: python manage.py test --verbosity=2

  # ────────────────────────────────────────────
  # JOB 2 — Build frontend React
  # ────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Build Vite
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sewivoire-frontend/package-lock.json

      - name: Installer les dépendances npm
        working-directory: sewivoire-frontend
        run: npm ci

      - name: Build de production
        working-directory: sewivoire-frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Sauvegarder les fichiers buildés
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: sewivoire-frontend/dist/
          retention-days: 1

  # ────────────────────────────────────────────
  # JOB 3 — Déploiement (uniquement sur push main)
  # ────────────────────────────────────────────
  deploy:
    name: Déploiement
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      # ── Backend : déploiement SSH sur serveur ──
      - name: Déployer le backend sur le serveur
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /var/www/sewivoire/SewIvoire/SewIvoire

            echo "── Mise à jour du code ──"
            git pull origin main

            echo "── Activation de l'environnement virtuel ──"
            source ../env/bin/activate

            echo "── Installation des dépendances ──"
            pip install -r requirements.txt --quiet

            echo "── Migrations ──"
            python manage.py migrate --no-input

            echo "── Fichiers statiques ──"
            python manage.py collectstatic --no-input --clear

            echo "── Redémarrage Gunicorn ──"
            sudo systemctl restart gunicorn-sewivoire

            echo "✅ Backend déployé"

      # ── Frontend : déploiement Vercel ──
      - name: Récupérer les fichiers buildés
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: sewivoire-frontend/dist/

      - name: Déployer le frontend sur Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:   ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:  ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: sewivoire-frontend
          vercel-args: '--prod'
