name: SewIvoire CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ────────────────────────────────────────────
  # JOB 1 — Tests backend Django
  # ────────────────────────────────────────────
  backend-ci:
    name: Backend — Tests Django
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sewivoire_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: SewIvoire/SewIvoire/requirements.txt

      - name: Installer les dépendances Python
        working-directory: SewIvoire/SewIvoire
        run: pip install -r requirements.txt

      - name: Créer le .env de test
        working-directory: SewIvoire/SewIvoire
        run: |
          cat > .env <<EOF
          SECRET_KEY=ci-secret-key-not-used-in-production
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          DB_NAME=sewivoire_test
          DB_USER=root
          DB_PASSWORD=root
          DB_HOST=127.0.0.1
          DB_PORT=3306
          EOF

      - name: Migrations + tests
        working-directory: SewIvoire/SewIvoire
        run: |
          python manage.py migrate --no-input
          python manage.py test --verbosity=2

  # ────────────────────────────────────────────
  # JOB 2 — Build frontend React
  # ────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build Vite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sewivoire-frontend/package-lock.json

      - name: Installer les dépendances npm
        working-directory: sewivoire-frontend
        run: npm ci

      - name: Build de production
        working-directory: sewivoire-frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Sauvegarder le build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: sewivoire-frontend/dist/
          include-hidden-files: true   # inclut .htaccess
          retention-days: 1

  # ────────────────────────────────────────────
  # JOB 3 — Pousse sur la branche deploy
  # (uniquement quand on pousse sur main)
  # O2Switch surveille cette branche via cron
  # ────────────────────────────────────────────
  deploy:
    name: Publier → branche deploy
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Récupérer le build frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: sewivoire-frontend/dist/

      - name: Pousser sur la branche deploy
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          # Force-add le dist/ (il est dans .gitignore sur main, mais on l'inclut dans deploy)
          git add -f sewivoire-frontend/dist/
          git commit -m "deploy: build $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "Rien à commiter"
          git push origin HEAD:refs/heads/deploy --force
